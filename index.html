<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene embedded arjs>
    <!-- create your content here. just a box for now -->
    <a-box 
           position='0 0.5 0' 
           material='opacity: 0.5; color: #40b3dd;'
    ></a-box>
    
    <a-text 
            value="Hello, World!"
            position='1.5 0.5 0' 
            material='opacity: 1; color: #fb757b;'
    ></a-text>
    
    <a-image 
             clickhandler
             src="hello-there-private-from-penguins-of-madagascar.gif"
             position='0 0.5 0.55' 
    ></a-image>
    
    <!-- define a camera which will move according to the marker position -->
    
    <a-marker-camera type='pattern' url='pattern-rdm.patt'></a-marker-camera>
  </a-scene>
  
  <script>
    AFRAME.registerComponent('clickhandler', {
        init: function() {
            this.el.addEventListener('click', () => {
                alert('Clicked!')
            });
    }});
</script>
  
  <div class="buttons">
  <button class="say-hi-button"></button>
</div>
  
  <style>
    button{
      position:absolute;
      top:0;
      left:0;
      width:300px;
      height:300px;
    }
  </style>
</body>
