<!-- include A-Frame obviously -->
<script src="https://aframe.io/releases/0.6.0/aframe.min.js"></script>
<!-- include ar.js for A-Frame -->
<script src="https://jeromeetienne.github.io/AR.js/aframe/build/aframe-ar.js"></script>
<script>
            AFRAME.registerComponent('videohandler', {
                init: function () {
                    var marker = this.el;
                    this.vid = document.querySelector("#vid");

                    marker.addEventListener('markerFound', function () {
                        this.toggle = true;
                        this.vid.play();
                    }.bind(this));

                    marker.addEventListener('markerLost', function () {
                        this.toggle = false;
                        this.vid.pause();
                    }.bind(this));
                },
            });
        </script>
<body style='margin : 0px; overflow: hidden;'>
  <a-scene 
           embedded 
           arjs='sourceType: webcam; debugUIEnabled: false;'
           gesture-detector
           vr-mode-ui="enabled: false"
           >
    <!-- create your content here. just a box for now -->
    <a-box 
           class="box"
           position='0 0.5 0' 
           material='opacity: 0.5; color: #40b3dd;'
    ></a-box>
    
    <a-text 
            value="Hello, World!"
            position='1 0.5 0' 
            color="#fb757b"
    ></a-text>
    
    <a-image 
             clickhandler
             src="hello-there-private-from-penguins-of-madagascar.gif"
             position='0 0.5 0.55' 
    ></a-image>
    
    <!-- define a camera which will move according to the marker position -->
    
    <a-marker-camera type='pattern' url='pattern-rdm.patt' id="anchor"></a-marker-camera>
  </a-scene>
  
  <div class="buttons">
  <button class="say-hi-button"></button>
</div>
  
  
  <script>
    window.onload = function () {
      document
        .querySelector(".say-hi-button")
        .addEventListener("click", function () {
          // here you can change also a-scene or a-entity properties, like
          // changing your 3D model source, size, position and so on
          // or you can just open links, trigger actions...
        var p = document.querySelector('.box').object3D;
        var t = document.createTextNode(p.position.x);
        document.querySelector(".say-hi-button").appendChild(t);
        console.log(p);
        console.log(p.position);
        console.log(p.position.x);
        
        p.position.y = "3";
         
        });
    };
    
    var marker = document.getElementByID('anchor');
    marker.addEventListener("markerFound", (e)=>{
         var p = document.querySelector('.box').object3D;
         p.visible = "true";
    }
    marker.addEventListener("markerLost", (e)=>{
         var p = document.querySelector('.box').object3D;
         p.visible = "false";
    }
  </script>
  
  
  
  <style>
    button{
      position:absolute;
      top:0;
      left:0;
      width:100px;
      height:100px;
    }
  </style>
</body>
